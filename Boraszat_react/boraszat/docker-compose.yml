  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=szente-pince-gibszjakab900-28a1.c.aivencloud.com
      - PMA_PORT=14888

  api:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysqldb
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: boraszat

    command: node server.js
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  client:
    build: ./frontend/fooldal
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    depends_on:
      - api
    volumes:
      - ./frontend/fooldal:/usr/src/app
      - /usr/src/app/node_modules

