
services:
  mysqldb:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: boraszat
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql 
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysqldb
      PMA_USER: root
      PMA_PASSWORD: ""
      PMA_ARBITRARY: 1
    depends_on:
      mysqldb:
        condition: service_healthy

  api:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysqldb
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: boraszat
    depends_on:
      - mysqldb
    command: node server.js
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  client:
    build: ./frontend/fooldal
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    depends_on:
      - api
    volumes:
      - ./frontend/fooldal:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  db_data: