  #    - ./init.sql:/docker-entrypoint-initdb.d/init.sql
  #   healthcheck:
  #    test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root"]
  #    interval: 5s
  #    timeout: 5s
  #    retries: 10
      
  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=szente-pince-gibszjakab900-28a1.c.aivencloud.com
      - PMA_PORT=14888

  api:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      # Figyelem: Mivel a helyi mysqldb ki van kommentelve, 
      # ide is a felhős (Aiven) adatbázisod adatait érdemes majd beírni, 
      # különben nem fog tudni csatlakozni!
      DB_HOST: mysqldb 
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: boraszat
    command: node server.js
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  client:
    # JAVÍTVA: './frontend/fooldal' helyett most már csak './frontend'
    build: ./frontend
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    depends_on:
      - api
    volumes:
      # JAVÍTVA: Itt is kivettem a '/fooldal' részt
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  db_data: